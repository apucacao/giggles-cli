name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - run: cargo check --locked
      - run: cargo clippy --locked --all-targets -- -D warnings
      - run: cargo fmt --check
